  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ba(255,255,255,.92);border:1px solid rgba(255,255,255,.4);padding:7px 15px;border-radius:999px;\">Christian Academy of Louisville · Middle School<\u002Fdiv>\n      <div style=\"font-size:15px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin:28px 0 0;color:rgba(255,255,255,.9);\">House of Appreciation<\u002Fdiv>\n      <h1 style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(64px,13vw,184px);line-height:.84;letter-spacing:.01em;margin:8px 0 0;text-transform:uppercase;\">Zahvalan<\u002Fh1>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:30px;\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);padding:11px 18px;border-radius:999px;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;\">Animal · Dragon<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"padding:clamp(56px,8vw,104px) 24px;text-align:center;\">\n    <div style=\"max-width:880px;margin:0 auto;\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#c2912f;\">House Verse<\u002Fdiv>\n      <p style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(28px,4.4vw,52px);line-height:1.16;letter-spacing:.005em;margin:22px 0 0;color:#221f1b;\">“And whatever you do, whether in word or deed, do it all in the name of the Lord Jesus, giving thanks to God the Father through him.”<\u002Fp>\n      <div style=\"display:inline-flex;align-items:center;gap:12px;margin-top:28px;\">\n        <span style=\"width:34px;height:2px;background:#1a1713;\"><\u002Fspan>\n        <span style=\"font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1a1713;\">Colossians 3:17<\u002Fspan>\n        <span style=\"width:34px;height:2px;background:#1a1713;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"background:#16130f;color:#fff;padding:clamp(56px,7vw,96px) 24px;\">\n    <div style=\"max-width:1100px;margin:0 auto;\">\n      <div style=\"max-width:620px;\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#d6a94a;\">What we stand for<\u002Fdiv>\n        <h2 style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(32px,4.6vw,56px);line-height:1.02;margin:14px 0 0;text-transform:uppercase;\">The Spirit of Zahvalan<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.65;color:#cfc8bc;margin:20px 0 0;\">Zahvalan is the House of Appreciation. Our dragon stands for noticing the good in others, giving thanks, and lifting up our community with gratitude and encouragement.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:38px;\">\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-top:4px solid #c9a24a;border-radius:14px;padding:24px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:24px;text-transform:uppercase;letter-spacing:.02em;\">Gratitude<\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:15.5px;line-height:1.55;color:#bcb6ab;\">Noticing the good around us and giving thanks for it.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-top:4px solid #c9a24a;border-radius:14px;padding:24px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:24px;text-transform:uppercase;letter-spacing:.02em;\">Encouragement<\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:15.5px;line-height:1.55;color:#bcb6ab;\">Building others up with words and actions every day.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-top:4px solid #c9a24a;border-radius:14px;padding:24px;\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:24px;text-transform:uppercase;letter-spacing:.02em;\">Recognition<\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:15.5px;line-height:1.55;color:#bcb6ab;\">Celebrating the wins and efforts of our house members.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"padding:clamp(56px,7vw,96px) 24px;text-align:center;\">\n    <div style=\"max-width:760px;margin:0 auto;\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#c2912f;\">House Leader<\u002Fdiv>\n      <h2 style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(34px,4.6vw,54px);line-height:1.02;margin:12px 0 0;text-transform:uppercase;\">Mrs. Carpenter<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.65;color:#48433c;margin:18px 0 0;\">Mrs. Carpenter leads Zahvalan — cheering on house members, organizing events, and keeping the grateful spirit of the dragon alive all year long.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"background:#1a1713;color:#fff;padding:clamp(44px,6vw,72px) 24px;text-align:center;\">\n    <div style=\"max-width:1100px;margin:0 auto;\">\n      <h2 style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(28px,3.6vw,44px);line-height:1.05;margin:0;text-transform:uppercase;\">Explore the other houses<\u002Fh2>\n      <a href=\"index.html\" style=\"display:inline-flex;align-items:center;gap:9px;margin-top:24px;background:#fff;color:#1a1713;padding:14px 26px;border-radius:999px;font-weight:800;font-size:15px;letter-spacing:.03em;text-transform:uppercase;text-decoration:none;\">All Six Houses <span style=\"font-size:18px;\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#0f0d0a;color:#8d857a;padding:32px 24px;text-align:center;\">\n    <div style=\"max-width:1100px;margin:0 auto;font-size:14px;letter-spacing:.04em;\">Christian Academy of Loui
